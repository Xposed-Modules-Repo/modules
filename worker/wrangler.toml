name = "modules-webhook-debouncer"
main = "src/index.ts"
compatibility_date = "2026-05-11"

[[durable_objects.bindings]]
name = "DEBOUNCER"
class_name = "WebhookDebouncer"

[[d1_databases]]
binding = "MODULES_METADATA_CACHE"
database_name = "modules-build-metadata-cache"
database_id = "65e5b2d4-c6c3-4c1f-8eb1-17dde6c8a41d"

[[d1_databases]]
binding = "MODULES_README_CACHE"
database_name = "modules-build-readme-cache"
database_id = "d65705d6-c416-43b7-9cc7-f8a7971ce464"

[[d1_databases]]
binding = "MODULES_RELEASE_CACHE"
database_name = "modules-build-release-cache"
database_id = "998dbc82-4265-434d-a0ae-8b64cd708405"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebhookDebouncer"]

[vars]
GITHUB_OWNER = "Xposed-Modules-Repo"
QUIET_SECONDS = "120"
PENDING_TTL_SECONDS = "3600"

# Configure as secrets:
# wrangler secret put GITHUB_WEBHOOK_SECRET -c worker/wrangler.toml
# wrangler secret put PAGES_DEPLOY_HOOK_URL -c worker/wrangler.toml
# wrangler secret put DIRTY_REPOS_TOKEN -c worker/wrangler.toml
# Optional: wrangler secret put D1_CACHE_TOKEN -c worker/wrangler.toml
